<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Manager Pro</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { transition: background-color 0.2s, color 0.2s; }
        .marked-item { opacity: 0.4; background-color: rgba(244, 63, 94, 0.08) !important; }
        .marked-text { text-decoration: line-through; color: #f43f5e !important; }
        .copied-today-item { background-color: rgba(16, 185, 129, 0.04); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-indigo-600 dark:text-indigo-400">DATA PRO</h1>
                <p id="saveIndicator" class="text-[11px] sm:text-xs font-mono text-slate-500 mt-1 uppercase tracking-widest">
                    MENUNGGU DATA...
                </p>
            </div>
            <button id="themeToggle" class="p-3 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:scale-105 transition cursor-pointer">
                <i id="themeIcon" class="fa-solid fa-sun text-amber-400"></i>
            </button>
        </header>

        <nav class="flex overflow-x-auto gap-1 mb-6 bg-white dark:bg-slate-800 p-1.5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
            <button onclick="switchTab('rumah_tangga')" id="tab-rumah_tangga" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2">
                <i class="fa-solid fa-house"></i> Rumah Tangga
            </button>
            <button onclick="switchTab('usaha_micro')" id="tab-usaha_micro" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-shop"></i> Usaha Micro
            </button>
            <button onclick="switchTab('verifikasi')" id="tab-verifikasi" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-user-check"></i> Verifikasi
            </button>
            <button onclick="switchTab('opsi_lain')" id="tab-opsi_lain" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-bars-staggered"></i> Opsi Lain
            </button>
        </nav>

        <div id="inputSection" class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700 mb-6 transition-all">
            <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-6 bg-indigo-500 rounded-full"></div>
                    <h2 class="text-lg font-bold">Input Data <span id="inputCategoryName" class="text-indigo-500 italic">Rumah Tangga</span></h2>
                </div>
                <button onclick="handleImportTrigger()" class="text-xs font-bold text-indigo-600 dark:text-indigo-400 hover:underline cursor-pointer">
                    <i class="fa-solid fa-upload mr-1"></i> Punya file cadangan (.json)? Impor di sini
                </button>
            </div>
            <textarea id="rawInput" rows="6" class="w-full p-4 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-4 focus:ring-indigo-500/20 focus:outline-none font-mono text-sm dark:text-white text-slate-900" placeholder="Tempel data baris untuk kategori ini di sini..."></textarea>
            
            <div class="flex flex-wrap gap-3 mt-4">
                <button id="btnLoadData" class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition cursor-pointer active:scale-95 text-sm">
                    MUAT DATA KATEGORI INI
                </button>
            </div>
        </div>

        <div id="mainDashboard" class="hidden">
            <div class="flex flex-wrap gap-4 justify-between items-center mb-6">
                <div class="flex gap-2">
                    <button id="btnShuffle" class="p-3 bg-amber-100 dark:bg-amber-950/30 text-amber-600 dark:text-amber-400 rounded-xl border border-amber-200 dark:border-amber-900 transition hover:scale-105 cursor-pointer" title="Acak Baris Aktif">
                        <i class="fa-solid fa-shuffle"></i> <span class="text-xs font-bold ml-1 hidden sm:inline">Acak Baris Aktif</span>
                    </button>
                    <button id="btnReset" class="p-3 bg-blue-100 dark:bg-blue-950/30 text-blue-600 dark:text-blue-400 rounded-xl border border-blue-200 dark:border-blue-900 transition hover:scale-105 cursor-pointer" title="Reset ke Urutan Awal">
                        <i class="fa-solid fa-rotate-left"></i> <span class="text-xs font-bold ml-1 hidden sm:inline">Reset Awal</span>
                    </button>
                </div>
                
                <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                    <button id="btnExport" class="flex-1 sm:flex-none px-4 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 font-bold rounded-xl border border-slate-200 dark:border-slate-700 transition cursor-pointer text-xs" title="Amankan seluruh sistem ke file komputer">
                        <i class="fa-solid fa-download mr-1.5 text-emerald-500"></i> EXPORT ALL
                    </button>
                    <button id="btnImport" class="flex-1 sm:flex-none px-4 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 font-bold rounded-xl border border-slate-200 dark:border-slate-700 transition cursor-pointer text-xs" title="Muat file cadangan global">
                        <i class="fa-solid fa-upload mr-1.5 text-indigo-500"></i> IMPORT BACKUP
                    </button>
                    <input type="file" id="fileImport" class="hidden" accept=".json">

                    <button id="btnClear" class="w-full sm:w-auto px-5 py-3 bg-rose-50 dark:bg-rose-950/20 text-rose-600 dark:text-rose-400 font-bold rounded-xl border border-rose-100 dark:border-rose-900 transition hover:bg-rose-600 hover:text-white cursor-pointer text-xs">
                        <i class="fa-solid fa-trash-can mr-1.5"></i> GANTI DATA KATEGORI INI
                    </button>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex flex-wrap justify-between items-center gap-4">
                    <div class="flex flex-wrap gap-x-4 gap-y-2 text-xs font-black uppercase tracking-widest">
                        <div class="text-slate-400">TOTAL: <span id="totalCount" class="text-indigo-600 dark:text-indigo-400 ml-1">0</span></div>
                        <div class="text-slate-400 border-l border-slate-300 dark:border-slate-600 pl-4">AKTIF: <span id="activeCount" class="text-emerald-600 dark:text-emerald-400 ml-1">0</span></div>
                        <div class="text-slate-400 border-l border-slate-300 dark:border-slate-600 pl-4">TANDA X: <span id="xCount" class="text-rose-600 dark:text-rose-400 ml-1">0</span></div>
                    </div>
                    <span class="text-[11px] text-slate-400 italic">Data X otomatis bergeser paling bawah</span>
                </div>
                <div id="dataListContainer" class="divide-y divide-slate-100 dark:divide-slate-700 max-h-[600px] overflow-y-auto">
                    </div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-8 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 text-sm font-bold tracking-tight">
            DATA BERHASIL DISALIN!
        </div>
    </div>

    <script>
        // --- DATA STRUCTURE V4.2 ---
        let appState = {
            currentTab: 'rumah_tangga',
            tabs: { rumah_tangga: [], usaha_micro: [], verifikasi: [], opsi_lain: [] },
            original: { rumah_tangga: [], usaha_micro: [], verifikasi: [], opsi_lain: [] }
        };

        const categories = {
            rumah_tangga: 'Rumah Tangga',
            usaha_micro: 'Usaha Micro',
            verifikasi: 'Verifikasi',
            opsi_lain: 'Opsi Lain'
        };

        const saveIndicator = document.getElementById('saveIndicator');
        const inputCategoryName = document.getElementById('inputCategoryName');
        const dataListContainer = document.getElementById('dataListContainer');
        const totalCount = document.getElementById('totalCount');
        const activeCountEl = document.getElementById('activeCount');
        const xCountEl = document.getElementById('xCount');
        const rawInput = document.getElementById('rawInput');
        const toast = document.getElementById('toast');
        const htmlEl = document.documentElement;

        // --- CORE LOGIC ---
        function initApp() {
            const saved = localStorage.getItem('app_state_stable_v4');
            if (saved) { appState = JSON.parse(saved); }
            initTheme();
            updateTabUI();
            checkDisplayMode();
        }

        function saveState() {
            localStorage.setItem('app_state_stable_v4', JSON.stringify(appState));
            updateTimestamp();
        }

        function getTodayString() {
            const now = new Date();
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const y = String(now.getFullYear()).slice(-2);
            return `${d}-${m}-${y}`;
        }

        function updateTimestamp() {
            const now = new Date();
            const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            saveIndicator.textContent = `Penyimpanan Otomatis Aktif (${getTodayString()} ${time})`;
        }

        // --- NAVIGATION LOGIC ---
        window.switchTab = function(tabKey) {
            appState.currentTab = tabKey;
            updateTabUI();
            checkDisplayMode(); // Memeriksa ketersediaan data khusus untuk tab baru yang dibuka
            saveState();
        }

        function updateTabUI() {
            Object.keys(categories).forEach(key => {
                const btn = document.getElementById(`tab-${key}`);
                if (btn) {
                    if (key === appState.currentTab) {
                        btn.className = "flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-bold border border-indigo-200 dark:border-indigo-800";
                    } else {
                        btn.className = "flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800";
                    }
                }
            });
            inputCategoryName.textContent = categories[appState.currentTab];
        }

        // PERBAIKAN UTAMA: Mengisolasi deteksi layar berdasarkan kategori aktif saja!
        function checkDisplayMode() {
            const currentTabData = appState.tabs[appState.currentTab];
            
            if (currentTabData && currentTabData.length > 0) {
                // Jika kategori aktif memiliki data, tampilkan Dashboard, sembunyikan Input
                document.getElementById('inputSection').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                renderList();
            } else {
                // Jika kategori aktif kosong, tampilkan halaman Input, sembunyikan Dashboard
                document.getElementById('inputSection').classList.remove('hidden');
                document.getElementById('mainDashboard').classList.add('hidden');
            }
        }

        // --- DATA INPUT ---
        document.getElementById('btnLoadData').onclick = () => {
            const text = rawInput.value.trim();
            if (!text) return;

            const lines = text.split('\n')
                              .map(l => l.trim())
                              .filter(l => l.length > 0)
                              .map(val => ({ val, marked: false, lastCopied: "" }));

            appState.tabs[appState.currentTab] = lines;
            appState.original[appState.currentTab] = JSON.parse(JSON.stringify(lines));
            
            rawInput.value = '';
            saveState();
            checkDisplayMode();
        };

        // --- RENDER COMPONENT ---
        function renderList() {
            const list = appState.tabs[appState.currentTab] || [];
            const todayStr = getTodayString();
            
            const total = list.length;
            const totalX = list.filter(item => item.marked).length;
            const totalAktif = total - totalX;

            totalCount.textContent = total;
            activeCountEl.textContent = totalAktif;
            xCountEl.textContent = totalX;
            
            if (total === 0) return;

            dataListContainer.innerHTML = list.map((item, idx) => {
                const isCopiedToday = item.lastCopied === todayStr;
                const isSalinDisabled = item.marked || isCopiedToday; 
                const isPakaiDisabled = item.marked;                  

                return `
                <div class="group flex items-center justify-between p-4 ${item.marked ? 'marked-item' : (isCopiedToday ? 'copied-today-item' : 'hover:bg-indigo-50/20 dark:hover:bg-indigo-950/10')} transition-all">
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-mono text-slate-400 dark:text-slate-500 w-6">${idx + 1}</span>
                        <div class="font-mono text-base tracking-widest ${item.marked ? 'marked-text' : (isCopiedToday ? 'text-emerald-600 dark:text-emerald-400 line-through opacity-60' : 'text-slate-700 dark:text-slate-200')} select-all">
                            ${item.val}
                        </div>
                        ${isCopiedToday ? '<span class="text-[9px] px-2 py-0.5 rounded bg-emerald-100 text-emerald-800 dark:bg-emerald-950/50 dark:text-emerald-400 font-bold uppercase tracking-wider"><i class="fa-solid fa-check-double mr-1"></i>Selesai Hari Ini</span>' : ''}
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleMark(${idx})" class="w-10 h-10 flex items-center justify-center rounded-lg border ${item.marked ? 'bg-rose-600 border-rose-600 text-white shadow-md shadow-rose-500/20' : 'border-slate-300 dark:border-slate-600 text-slate-400 hover:border-rose-500 hover:text-rose-500'} transition cursor-pointer" title="Beri Tanda X">
                            <i class="fa-solid fa-xmark text-sm"></i>
                        </button>
                        
                        <button onclick="copyData('${item.val}', ${idx})" 
                                class="px-4 py-2 text-xs font-bold rounded-lg border transition cursor-pointer 
                                ${isSalinDisabled ? 'bg-slate-100 dark:bg-slate-700 border-transparent text-slate-400 dark:text-slate-500 cursor-not-allowed' : 'bg-white dark:bg-slate-700 border-slate-300 dark:border-slate-600 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 dark:text-slate-200'}"
                                ${isSalinDisabled ? 'disabled' : ''}>
                            SALIN
                        </button>

                        <button onclick="markUsed(${idx})" 
                                class="px-4 py-2 text-xs font-bold rounded-lg shadow-sm transition cursor-pointer
                                ${isPakaiDisabled ? 'bg-slate-200 dark:bg-slate-700 text-slate-400 dark:text-slate-500 cursor-not-allowed shadow-none' : 'bg-emerald-500 hover:bg-emerald-600 text-white'}"
                                ${isPakaiDisabled ? 'disabled' : ''}>
                            PAKAI
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        // --- ROW ACTIONS ---
        window.toggleMark = function(idx) {
            const list = appState.tabs[appState.currentTab];
            const item = list.splice(idx, 1)[0];
            item.marked = !item.marked;
            
            if (item.marked) {
                list.push(item);
            } else {
                const firstXIdx = list.findIndex(i => i.marked);
                if (firstXIdx === -1) { list.push(item); } 
                else { list.splice(firstXIdx, 0, item); }
            }
            saveState();
            renderList();
        }

        window.copyData = function(val, idx) {
            const list = appState.tabs[appState.currentTab];
            if (list[idx].marked || list[idx].lastCopied === getTodayString()) return; 

            navigator.clipboard.writeText(val).then(() => {
                list[idx].lastCopied = getTodayString();
                saveState();
                renderList();

                toast.classList.remove('opacity-0');
                setTimeout(() => toast.classList.add('opacity-0'), 1200);
            });
        }

        window.markUsed = function(idx) {
            const list = appState.tabs[appState.currentTab];
            const item = list.splice(idx, 1)[0];
            
            const firstXIdx = list.findIndex(i => i.marked);
            if (firstXIdx === -1) { list.push(item); } 
            else { list.splice(firstXIdx, 0, item); }
            saveState();
            renderList();
        }

        // --- BACKUP MODUL ---
        document.getElementById('btnExport').onclick = () => {
            const dataStr = localStorage.getItem('app_state_stable_v4');
            if (!dataStr) {
                alert('Gagal mengekspor: Tidak ada data aktif di dalam sistem.');
                return;
            }
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = `DATAPRO_BACKUP_${getTodayString()}.json`;
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            URL.revokeObjectURL(url);
        };

        window.handleImportTrigger = () => { document.getElementById('fileImport').click(); };
        document.getElementById('btnImport').onclick = window.handleImportTrigger;

        document.getElementById('fileImport').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const parsedData = JSON.parse(event.target.result);
                    if (!parsedData.tabs || !parsedData.currentTab) {
                        alert('Gagal memulihkan: Format dokumen cadangan salah/rusak.');
                        return;
                    }
                    if (confirm('Sistem mendeteksi file cadangan yang utuh. Lanjutkan sinkronisasi ulang data?')) {
                        appState = parsedData;
                        saveState();
                        checkDisplayMode();
                        alert('SELAMAT! Pemulihan sistem berhasil disinkronkan secara total.');
                    }
                } catch (err) {
                    alert('Error: Dokumen tersebut bukan arsip cadangan resmi.');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        };

        // --- DASHBOARD ACTIONS ---
        document.getElementById('btnShuffle').onclick = () => {
            const list = appState.tabs[appState.currentTab];
            const activeItems = list.filter(i => !i.marked);
            const xItems = list.filter(i => i.marked);
            
            if (activeItems.length <= 1) return;
            
            for (let i = activeItems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [activeItems[i], activeItems[j]] = [activeItems[j], activeItems[i]];
            }
            
            appState.tabs[appState.currentTab] = [...activeItems, ...xItems];
            saveState();
            renderList();
        };

        document.getElementById('btnReset').onclick = () => {
            if (confirm(`Reset urutan data ${categories[appState.currentTab]} kembali ke struktur awal?`)) {
                appState.tabs[appState.currentTab] = JSON.parse(JSON.stringify(appState.original[appState.currentTab]));
                saveState();
                renderList();
            }
        };

        // PERBAIKAN TOMBOL GANTI DATA: Otomatis melempar user ke halaman input tab aktif tersebut
        document.getElementById('btnClear').onclick = () => {
            const currentName = categories[appState.currentTab];
            if (confirm(`Hapus seluruh data kategori [${currentName}]? Tab lainnya TIDAK akan terhapus.`)) {
                appState.tabs[appState.currentTab] = [];
                appState.original[appState.currentTab] = [];
                saveState();
                checkDisplayMode(); // Layar otomatis mengevaluasi tab yang kosong ini dan menampilkan form input!
            }
        };

        // --- THEME TOGGLE ---
        function initTheme() {
            const currentTheme = localStorage.getItem('theme') || 'dark';
            if (currentTheme === 'dark') { htmlEl.classList.add('dark'); } 
            else { htmlEl.classList.remove('dark'); }
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = htmlEl.classList.contains('dark');
            const icon = document.getElementById('themeIcon');
            icon.className = isDark ? 'fa-solid fa-sun text-amber-400' : 'fa-solid fa-moon text-indigo-600';
        }

        document.getElementById('themeToggle').onclick = () => {
            const isDark = htmlEl.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        };

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
