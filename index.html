<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Manager Pro - Versi Logika X</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        // Konfigurasi wajib Tailwind untuk toggle dark mode
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        body { transition: background-color 0.2s, color 0.2s; }
        .marked-item { opacity: 0.4; background-color: rgba(244, 63, 94, 0.08) !important; }
        .marked-text { text-decoration: line-through; color: #f43f5e !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-indigo-600 dark:text-indigo-400">DATA PRO</h1>
                <p id="saveIndicator" class="text-[11px] sm:text-xs font-mono text-slate-500 mt-1 uppercase tracking-widest">
                    MENUNGGU DATA...
                </p>
            </div>
            <button id="themeToggle" class="p-3 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:scale-105 transition cursor-pointer">
                <i id="themeIcon" class="fa-solid fa-sun text-amber-400"></i>
            </button>
        </header>

        <nav class="flex overflow-x-auto gap-1 mb-6 bg-white dark:bg-slate-800 p-1.5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
            <button onclick="switchTab('rumah_tangga')" id="tab-rumah_tangga" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2">
                <i class="fa-solid fa-house"></i> Rumah Tangga
            </button>
            <button onclick="switchTab('usaha_micro')" id="tab-usaha_micro" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-shop"></i> Usaha Micro
            </button>
            <button onclick="switchTab('verifikasi')" id="tab-verifikasi" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-user-check"></i> Verifikasi
            </button>
            <button onclick="switchTab('meninggal')" id="tab-meninggal" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-monument"></i> Meninggal
            </button>
        </nav>

        <div id="inputSection" class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700 mb-6 transition-all">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-2 h-6 bg-indigo-500 rounded-full"></div>
                <h2 class="text-lg font-bold">Input Data <span id="inputCategoryName" class="text-indigo-500 italic">Rumah Tangga</span></h2>
            </div>
            <textarea id="rawInput" rows="6" class="w-full p-4 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-4 focus:ring-indigo-500/20 focus:outline-none font-mono text-sm dark:text-white text-slate-900" placeholder="Tempel 800+ baris data di sini..."></textarea>
            <div class="flex flex-wrap gap-3 mt-4">
                <button id="btnLoadData" class="flex-1 sm:flex-none px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition cursor-pointer active:scale-95">
                    MUAT DATA
                </button>
            </div>
        </div>

        <div id="mainDashboard" class="hidden">
            <div class="flex flex-wrap gap-3 justify-between items-center mb-6">
                <div class="flex gap-2">
                    <button id="btnShuffle" class="p-3 bg-amber-100 dark:bg-amber-950/30 text-amber-600 dark:text-amber-400 rounded-xl border border-amber-200 dark:border-amber-900 transition hover:scale-105 cursor-pointer" title="Acak Baris yang TIDAK bertanda X">
                        <i class="fa-solid fa-shuffle"></i> <span class="text-xs font-bold ml-1 hidden sm:inline">Acak Baris Aktif</span>
                    </button>
                    <button id="btnReset" class="p-3 bg-blue-100 dark:bg-blue-950/30 text-blue-600 dark:text-blue-400 rounded-xl border border-blue-200 dark:border-blue-900 transition hover:scale-105 cursor-pointer" title="Reset ke Urutan Awal">
                        <i class="fa-solid fa-rotate-left"></i> <span class="text-xs font-bold ml-1 hidden sm:inline">Reset Awal</span>
                    </button>
                </div>
                
                <button id="btnClear" class="px-6 py-3 bg-rose-50 dark:bg-rose-950/20 text-rose-600 dark:text-rose-400 font-bold rounded-xl border border-rose-100 dark:border-rose-900 transition hover:bg-rose-600 hover:text-white cursor-pointer">
                    <i class="fa-solid fa-trash-can mr-2"></i> GANTI DATA
                </button>
            </div>

            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-between items-center">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Daftar Angka (<span id="totalCount">0</span>)</span>
                    <span class="text-[11px] text-slate-400 italic">Data X otomatis bergeser paling bawah</span>
                </div>
                <div id="dataListContainer" class="divide-y divide-slate-100 dark:divide-slate-700 max-h-[600px] overflow-y-auto">
                    </div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-8 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 text-sm font-bold tracking-tight">
            DATA BERHASIL DISALIN!
        </div>
    </div>

    <script>
        // --- DATA STRUCTURE ---
        let appState = {
            currentTab: 'rumah_tangga',
            tabs: { rumah_tangga: [], usaha_micro: [], verifikasi: [], meninggal: [] },
            original: { rumah_tangga: [], usaha_micro: [], verifikasi: [], meninggal: [] }
        };

        const categories = {
            rumah_tangga: 'Rumah Tangga',
            usaha_micro: 'Usaha Micro',
            verifikasi: 'Verifikasi',
            meninggal: 'Meninggal'
        };

        // DOM elements
        const saveIndicator = document.getElementById('saveIndicator');
        const inputCategoryName = document.getElementById('inputCategoryName');
        const dataListContainer = document.getElementById('dataListContainer');
        const totalCount = document.getElementById('totalCount');
        const rawInput = document.getElementById('rawInput');
        const toast = document.getElementById('toast');
        const htmlEl = document.documentElement;

        // --- CORE LOGIC ---
        function initApp() {
            const saved = localStorage.getItem('app_state_logic_x_v2');
            if (saved) { appState = JSON.parse(saved); }
            initTheme();
            updateTabUI();
            checkDisplayMode();
        }

        function saveState() {
            localStorage.setItem('app_state_logic_x_v2', JSON.stringify(appState));
            updateTimestamp();
        }

        // Format waktu sesuai request: (tanggal waktu DD-MM-YY)
        function updateTimestamp() {
            const now = new Date();
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const y = String(now.getFullYear()).slice(-2);
            const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            saveIndicator.textContent = `Tersimpan otomatis ke baris bawah (${d}-${m}-${y} ${time})`;
        }

        // --- NAVIGATION LOGIC ---
        window.switchTab = function(tabKey) {
            appState.currentTab = tabKey;
            updateTabUI();
            checkDisplayMode();
            saveState();
        }

        function updateTabUI() {
            Object.keys(categories).forEach(key => {
                const btn = document.getElementById(`tab-${key}`);
                if (key === appState.currentTab) {
                    btn.className = "flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-bold border border-indigo-200 dark:border-indigo-800";
                } else {
                    btn.className = "flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800";
                }
            });
            inputCategoryName.textContent = categories[appState.currentTab];
        }

        function checkDisplayMode() {
            const currentTabData = appState.tabs[appState.currentTab];
            if (currentTabData && currentTabData.length > 0) {
                document.getElementById('inputSection').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                renderList();
            } else {
                document.getElementById('inputSection').classList.remove('hidden');
                document.getElementById('mainDashboard').classList.add('hidden');
            }
        }

        // --- DATA INPUT ---
        document.getElementById('btnLoadData').onclick = () => {
            const text = rawInput.value.trim();
            if (!text) return;

            const lines = text.split('\n')
                              .map(l => l.trim())
                              .filter(l => l.length > 0)
                              .map(val => ({ val, marked: false }));

            appState.tabs[appState.currentTab] = lines;
            appState.original[appState.currentTab] = JSON.parse(JSON.stringify(lines));
            
            rawInput.value = '';
            saveState();
            checkDisplayMode();
        };

        // --- RENDER DENGAN INTEGRASI LOGIKA BARU ---
        function renderList() {
            const list = appState.tabs[appState.currentTab];
            totalCount.textContent = list.length;
            
            dataListContainer.innerHTML = list.map((item, idx) => `
                <div class="group flex items-center justify-between p-4 ${item.marked ? 'marked-item' : 'hover:bg-indigo-50/20 dark:hover:bg-indigo-950/10'} transition-all">
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-mono text-slate-400 dark:text-slate-500 w-6">${idx + 1}</span>
                        <div class="font-mono text-base tracking-widest ${item.marked ? 'marked-text' : 'text-slate-700 dark:text-slate-200'} select-all">
                            ${item.val}
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleMark(${idx})" class="w-10 h-10 flex items-center justify-center rounded-lg border ${item.marked ? 'bg-rose-600 border-rose-600 text-white shadow-md shadow-rose-500/20' : 'border-slate-300 dark:border-slate-600 text-slate-400 hover:border-rose-500 hover:text-rose-500'} transition cursor-pointer" title="${item.marked ? 'Buka Tanda X' : 'Beri Tanda X (Pindah ke bawah)'}">
                            <i class="fa-solid fa-xmark text-sm"></i>
                        </button>
                        
                        <button onclick="copyData('${item.val}', ${item.marked})" 
                                class="px-4 py-2 text-xs font-bold rounded-lg border transition cursor-pointer 
                                ${item.marked ? 'bg-slate-100 dark:bg-slate-700 border-transparent text-slate-400 dark:text-slate-500 cursor-not-allowed' : 'bg-white dark:bg-slate-700 border-slate-300 dark:border-slate-600 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 dark:text-slate-200'}"
                                ${item.marked ? 'disabled' : ''}>
                            SALIN
                        </button>

                        <button onclick="markUsed(${idx})" 
                                class="px-4 py-2 text-xs font-bold rounded-lg shadow-sm transition cursor-pointer
                                ${item.marked ? 'bg-slate-200 dark:bg-slate-700 text-slate-400 dark:text-slate-500 cursor-not-allowed shadow-none' : 'bg-emerald-500 hover:bg-emerald-600 text-white'}"
                                ${item.marked ? 'disabled' : ''}>
                            PAKAI
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- PERUBAHAN LOGIKA MANIPULASI BARIS ---

        // Fungsi Tanda X: Memindahkan langsung ke urutan terbawah absolut
        window.toggleMark = function(idx) {
            const list = appState.tabs[appState.currentTab];
            const item = list.splice(idx, 1)[0]; // Ambil data dari index saat ini
            item.marked = !item.marked; // Ganti status
            
            if (item.marked) {
                // Jika dirubah jadi X, langsung masukkan ke baris paling akhir array
                list.push(item);
            } else {
                // Jika tanda X dilepas, pindahkan ke batas bawah data aktif (sebelum data X lainnya)
                const firstXIdx = list.findIndex(i => i.marked);
                if (firstXIdx === -1) {
                    list.push(item);
                } else {
                    list.splice(firstXIdx, 0, item);
                }
            }
            saveState();
            renderList();
        }

        // Fungsi Salin
        window.copyData = function(val, isMarked) {
            if (isMarked) return; 
            navigator.clipboard.writeText(val).then(() => {
                toast.classList.remove('opacity-0');
                setTimeout(() => toast.classList.add('opacity-0'), 1200);
            });
        }

        // Fungsi Pakai: Pindah ke posisi bawah, tapi di atas posisi baris X
        window.markUsed = function(idx) {
            const list = appState.tabs[appState.currentTab];
            const item = list.splice(idx, 1)[0];
            
            // Cari lokasi index pertama dari item bertanda X
            const firstXIdx = list.findIndex(i => i.marked);
            if (firstXIdx === -1) {
                // Jika tidak ada data bertanda X sama sekali, lempar ke paling bawah
                list.push(item);
            } else {
                // Jika ada data X, selipkan tepat di atas baris data X pertama tersebut
                list.splice(firstXIdx, 0, item);
            }
            saveState();
            renderList();
        }

        // --- TOMBOL AKSI UTAMA GLOBAL ---

        // Mengacak data AKTIF saja (Mengabaikan/tidak merubah posisi data X di bawah)
        document.getElementById('btnShuffle').onclick = () => {
            const list = appState.tabs[appState.currentTab];
            const activeItems = list.filter(i => !i.marked);
            const xItems = list.filter(i => i.marked);
            
            if (activeItems.length <= 1) return; // Lewati jika tidak ada baris aktif yang bisa diacak
            
            // Fisher-Yates untuk data aktif saja
            for (let i = activeItems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [activeItems[i], activeItems[j]] = [activeItems[j], activeItems[i]];
            }
            
            // Gabungkan kembali: Data Aktif Teracak + Data X yang Tetap Diam di bawah
            appState.tabs[appState.currentTab] = [...activeItems, ...xItems];
            saveState();
            renderList();
        };

        document.getElementById('btnReset').onclick = () => {
            if (confirm('Reset urutan kategori ini kembali ke struktur awal?')) {
                appState.tabs[appState.currentTab] = JSON.parse(JSON.stringify(appState.original[appState.currentTab]));
                saveState();
                renderList();
            }
        };

        document.getElementById('btnClear').onclick = () => {
            if (confirm('Hapus seluruh data kategori saat ini dan muat data baru?')) {
                appState.tabs[appState.currentTab] = [];
                appState.original[appState.currentTab] = [];
                saveState();
                checkDisplayMode();
            }
        };

        // --- FIX THEME TOGGLE (100% WORKING LIGHT/DARK) ---
        function initTheme() {
            const currentTheme = localStorage.getItem('theme') || 'dark';
            if (currentTheme === 'dark') {
                htmlEl.classList.add('dark');
            } else {
                htmlEl.classList.remove('dark');
            }
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = htmlEl.classList.contains('dark');
            const icon = document.getElementById('themeIcon');
            if (isDark) {
                icon.className = 'fa-solid fa-sun text-amber-400';
            } else {
                icon.className = 'fa-solid fa-moon text-indigo-600';
            }
        }

        document.getElementById('themeToggle').onclick = () => {
            const isDark = htmlEl.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        };

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
