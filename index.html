<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penyederhana Input 16-Digit</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth transition untuk switch theme */
        body { transition: background-color 0.3s, color 0.3s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <header class="flex justify-between items-center mb-8 border-b border-slate-200 dark:border-slate-700 pb-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Data Manager 16-Digit</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400">Kelola dan salin data Anda dengan efisien.</p>
            </div>
            <button id="themeToggle" class="p-2 rounded-lg bg-slate-200 dark:bg-slate-800 hover:ring-2 hover:ring-indigo-500 cursor-pointer transition">
                <svg id="sunIcon" class="w-6 h-6 text-amber-500 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m2.828-9.9a5 5 0 11-7.07 7.07 5 5 0 017.07-7.07z"></path></svg>
                <svg id="moonIcon" class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </header>

        <div id="inputSection" class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-md border border-slate-200 dark:border-slate-700 mb-6 hidden">
            <h2 class="text-lg font-semibold mb-2">Input Data Baru</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Masukkan data 16-digit Anda di bawah ini (Satu baris untuk satu data).</p>
            <textarea id="rawInput" rows="10" class="w-full p-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-indigo-500 focus:outline-none font-mono text-sm" placeholder="Contoh:&#10;1234567890123456&#10;9876543210987654"></textarea>
            <button id="btnLoadData" class="mt-3 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow transition cursor-pointer w-full sm:w-auto">
                Muat Data
            </button>
        </div>

        <div id="mainDashboard" class="hidden">
            <div class="flex flex-wrap gap-3 justify-between items-center bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 mb-6">
                <div class="flex items-center gap-2">
                    <span class="flex h-3 w-3 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <span id="dataStatus" class="text-sm font-medium text-slate-600 dark:text-slate-300">Data Aman (Tersimpan Otomatis)</span>
                </div>
                
                <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                    <button id="btnShuffle" class="flex-1 sm:flex-initial px-4 py-2 text-sm bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-lg transition cursor-pointer">
                        🔀 Acak Baris
                    </button>
                    <button id="btnReset" class="flex-1 sm:flex-initial px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition cursor-pointer">
                        🔄 Reset Urutan
                    </button>
                    <button id="btnClear" class="px-4 py-2 text-sm bg-rose-600 hover:bg-rose-700 text-white font-medium rounded-lg transition cursor-pointer" title="Ganti dengan data baru">
                        🗑️ Hapus Semua
                    </button>
                </div>
            </div>

            <div id="toast" class="fixed top-4 right-4 bg-emerald-600 text-white px-4 py-2 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50 text-sm font-medium">
                Berhasil disalin!
            </div>

            <div class="bg-white dark:bg-slate-800 rounded-xl shadow-md border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider bg-slate-50 dark:bg-slate-800/50">
                    <span>Data Angka (Total: <span id="totalCount">0</span>)</span>
                    <span>Aksi</span>
                </div>
                <div id="dataListContainer" class="divide-y divide-slate-200 dark:divide-slate-700 max-h-[60vh] overflow-y-auto">
                    </div>
            </div>
        </div>

    </div>

    <script>
        // State Management
        let originalData = [];
        let currentData = [];

        // DOM Elements
        const inputSection = document.getElementById('inputSection');
        const mainDashboard = document.getElementById('mainDashboard');
        const rawInput = document.getElementById('rawInput');
        const btnLoadData = document.getElementById('btnLoadData');
        const dataListContainer = document.getElementById('dataListContainer');
        const totalCount = document.getElementById('totalCount');
        const toast = document.getElementById('toast');
        const dataStatus = document.getElementById('dataStatus');

        // Global Action Buttons
        document.getElementById('btnShuffle').addEventListener('click', shuffleData);
        document.getElementById('btnReset').addEventListener('click', resetData);
        document.getElementById('btnClear').addEventListener('click', clearAllData);

        // --- 1. INISIALISASI APLIKASI ---
        function initApp() {
            const savedOriginal = localStorage.getItem('original_16digit');
            const savedCurrent = localStorage.getItem('current_16digit');

            if (savedOriginal && savedCurrent) {
                originalData = JSON.parse(savedOriginal);
                currentData = JSON.parse(savedCurrent);
                showDashboard();
            } else {
                showInputSection();
            }
            initTheme();
        }

        function showInputSection() {
            inputSection.classList.remove('hidden');
            mainDashboard.classList.add('hidden');
        }

        function showDashboard() {
            inputSection.classList.add('hidden');
            mainDashboard.classList.remove('hidden');
            renderList();
        }

        // --- 2. INPUT DATA PROSES ---
        btnLoadData.addEventListener('click', () => {
            const text = rawInput.value.trim();
            if (!text) return alert('Silakan masukkan data terlebih dahulu!');

            // Memisahkan data per baris dan membersihkan spasi/karakter kosong
            const lines = text.split('\n')
                              .map(line => line.trim())
                              .filter(line => line.length > 0);

            if (lines.length === 0) return alert('Tidak ada data valid yang ditemukan.');

            originalData = [...lines];
            currentData = [...lines];

            saveToStorage();
            showDashboard();
            rawInput.value = ''; // Reset textarea
        });

        // --- 3. RENDER DATA LIST ---
        function renderList() {
            totalCount.textContent = currentData.length;
            
            if (currentData.length === 0) {
                dataListContainer.innerHTML = `<div class="p-8 text-center text-slate-400 dark:text-slate-500">Data kosong. Silakan klik Hapus Semua untuk memuat ulang.</div>`;
                return;
            }

            // Render cepat menggunakan array map & join
            dataListContainer.innerHTML = currentData.map((item, index) => `
                <div class="flex items-center justify-between p-3.5 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition">
                    <div class="font-mono text-base tracking-wider text-slate-700 dark:text-slate-200 select-all">
                        ${item}
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyToClipboard('${item}')" class="px-3 py-1.5 text-xs bg-slate-100 dark:bg-slate-700 hover:bg-indigo-50 dark:hover:bg-indigo-950 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium rounded-md border border-slate-300 dark:border-slate-600 transition cursor-pointer">
                            📋 Salin
                        </button>
                        <button onclick="markAsUsed(${index})" class="px-3 py-1.5 text-xs bg-emerald-500 hover:bg-emerald-600 text-white font-medium rounded-md shadow-sm transition cursor-pointer">
                            ✔ Terpakai
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- 4. LOGIKA TOMBOL AKSI UTAMA ---
        
        // Fungsi Salin (Copy)
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Tampilkan Toast
                toast.classList.remove('opacity-0');
                setTimeout(() => toast.classList.add('opacity-0'), 1500);
            }).catch(err => {
                console.error('Gagal menyalin text: ', err);
            });
        };

        // Fungsi Terpakai (Pindah ke paling bawah)
        window.markAsUsed = function(index) {
            // Ambil item dari index yang diklik
            const usedItem = currentData.splice(index, 1)[0];
            // Dorong ke urutan paling bawah
            currentData.push(usedItem);
            
            saveToStorage();
            renderList();
            updateStatusVisual();
        };

        // Fungsi Acak Baris (Shuffle)
        function shuffleData() {
            if (currentData.length <= 1) return;
            
            // Menggunakan algoritma Fisher-Yates Shuffle
            for (let i = currentData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentData[i], currentData[j]] = [currentData[j], currentData[i]];
            }
            
            saveToStorage();
            renderList();
        }

        // Fungsi Reset (Kembali ke urutan awal)
        function resetData() {
            if (confirm('Apakah Anda yakin ingin mengembalikan urutan data ke posisi semula?')) {
                currentData = [...originalData];
                saveToStorage();
                renderList();
            }
        }

        // Fungsi Hapus Semua (Untuk ganti data baru)
        function clearAllData() {
            if (confirm('Hapus semua data di sistem dan input data baru?')) {
                localStorage.removeItem('original_16digit');
                localStorage.removeItem('current_16digit');
                originalData = [];
                currentData = [];
                showInputSection();
            }
        }

        // --- 5. DATA PERSISTENCE (TANDA SAVE AMAN) ---
        function saveToStorage() {
            localStorage.setItem('original_16digit', JSON.stringify(originalData));
            localStorage.setItem('current_16digit', JSON.stringify(currentData));
        }

        function updateStatusVisual() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            dataStatus.textContent = `Tersimpan otomatis ke baris bawah (${timeString})`;
        }

        // --- 6. DARK / LIGHT MODE LOGIC ---
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const htmlEl = document.documentElement;

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'dark') {
                htmlEl.classList.add('dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                htmlEl.classList.remove('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        themeToggle.addEventListener('click', () => {
            if (htmlEl.classList.contains('dark')) {
                htmlEl.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                htmlEl.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        });

        // Jalankan Aplikasi saat DOM siap
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
