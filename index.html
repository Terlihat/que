<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Manager Pro - Multi Tab</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1 !important; font-weight: 700; }
        .marked-item { opacity: 0.5; background-color: rgba(244, 63, 94, 0.05); }
        .marked-text { text-decoration: line-through; color: #f43f5e !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-indigo-600 dark:text-indigo-400">DATA PRO</h1>
                <p id="saveIndicator" class="text-[10px] sm:text-xs font-mono text-slate-500 mt-1 uppercase tracking-widest">
                    MENUNGGU DATA...
                </p>
            </div>
            <button id="themeToggle" class="p-3 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:scale-105 transition cursor-pointer">
                <i id="themeIcon" class="fa-solid fa-moon text-indigo-500"></i>
            </button>
        </header>

        <nav class="flex overflow-x-auto no-scrollbar gap-1 mb-6 bg-white dark:bg-slate-800 p-1.5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
            <button onclick="switchTab('rumah_tangga')" id="tab-rumah_tangga" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2">
                <i class="fa-solid fa-house"></i> Rumah Tangga
            </button>
            <button onclick="switchTab('usaha_micro')" id="tab-usaha_micro" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-shop"></i> Usaha Micro
            </button>
            <button onclick="switchTab('verifikasi')" id="tab-verifikasi" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-user-check"></i> Verifikasi
            </button>
            <button onclick="switchTab('meninggal')" id="tab-meninggal" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm font-medium transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-monument"></i> Meninggal
            </button>
        </nav>

        <div id="inputSection" class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700 mb-6 transition-all">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-2 h-6 bg-indigo-500 rounded-full"></div>
                <h2 class="text-lg font-bold">Input Data <span id="inputCategoryName" class="text-indigo-500 italic">Rumah Tangga</span></h2>
            </div>
            <textarea id="rawInput" rows="6" class="w-full p-4 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-4 focus:ring-indigo-500/20 focus:outline-none font-mono text-sm" placeholder="Tempel 800+ baris data di sini..."></textarea>
            <div class="flex flex-wrap gap-3 mt-4">
                <button id="btnLoadData" class="flex-1 sm:flex-none px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition cursor-pointer active:scale-95">
                    MUAT DATA
                </button>
                <button id="btnCancelInput" class="hidden px-6 py-3 text-slate-500 font-medium hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition cursor-pointer">
                    Batal
                </button>
            </div>
        </div>

        <div id="mainDashboard" class="hidden">
            <div class="flex flex-wrap gap-3 justify-between items-center mb-6">
                <div class="flex gap-2">
                    <button id="btnShuffle" class="p-3 bg-amber-100 dark:bg-amber-950/30 text-amber-600 dark:text-amber-400 rounded-xl border border-amber-200 dark:border-amber-900 transition hover:scale-105 cursor-pointer" title="Acak Baris">
                        <i class="fa-solid fa-shuffle"></i>
                    </button>
                    <button id="btnReset" class="p-3 bg-blue-100 dark:bg-blue-950/30 text-blue-600 dark:text-blue-400 rounded-xl border border-blue-200 dark:border-blue-900 transition hover:scale-105 cursor-pointer" title="Reset ke Awal">
                        <i class="fa-solid fa-rotate-left"></i>
                    </button>
                </div>
                
                <button id="btnClear" class="px-6 py-3 bg-rose-50 dark:bg-rose-950/20 text-rose-600 dark:text-rose-400 font-bold rounded-xl border border-rose-100 dark:border-rose-900 transition hover:bg-rose-600 hover:text-white cursor-pointer">
                    <i class="fa-solid fa-trash-can mr-2"></i> GANTI DATA
                </button>
            </div>

            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-between items-center">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Daftar Angka (<span id="totalCount">0</span>)</span>
                    <i class="fa-solid fa-layer-group text-slate-400"></i>
                </div>
                <div id="dataListContainer" class="divide-y divide-slate-100 dark:divide-slate-700 max-h-[600px] overflow-y-auto">
                    </div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-8 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 text-sm font-bold tracking-tight">
            DATA BERHASIL DISALIN!
        </div>
    </div>

    <script>
        // --- DATA STRUCTURE ---
        // State sekarang menyimpan objek untuk tiap tab
        let appState = {
            currentTab: 'rumah_tangga',
            tabs: {
                rumah_tangga: [],
                usaha_micro: [],
                verifikasi: [],
                meninggal: []
            },
            original: {
                rumah_tangga: [],
                usaha_micro: [],
                verifikasi: [],
                meninggal: []
            }
        };

        const categories = {
            rumah_tangga: 'Rumah Tangga',
            usaha_micro: 'Usaha Micro',
            verifikasi: 'Verifikasi',
            meninggal: 'Meninggal'
        };

        // DOM Elements
        const saveIndicator = document.getElementById('saveIndicator');
        const inputCategoryName = document.getElementById('inputCategoryName');
        const dataListContainer = document.getElementById('dataListContainer');
        const totalCount = document.getElementById('totalCount');
        const rawInput = document.getElementById('rawInput');
        const toast = document.getElementById('toast');

        // --- CORE FUNCTIONS ---

        function initApp() {
            const saved = localStorage.getItem('app_state_multi_v1');
            if (saved) {
                appState = JSON.parse(saved);
            }
            updateTabUI();
            checkDisplayMode();
            initTheme();
        }

        function saveState() {
            localStorage.setItem('app_state_multi_v1', JSON.stringify(appState));
            updateTimestamp();
        }

        function updateTimestamp() {
            const now = new Date();
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const y = String(now.getFullYear()).slice(-2);
            const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            saveIndicator.textContent = `Tersimpan otomatis: ${time} ${d}-${m}-${y}`;
        }

        // --- TAB LOGIC ---

        window.switchTab = function(tabKey) {
            appState.currentTab = tabKey;
            updateTabUI();
            checkDisplayMode();
            saveState();
        }

        function updateTabUI() {
            // Update button styles
            Object.keys(categories).forEach(key => {
                const btn = document.getElementById(`tab-${key}`);
                if (key === appState.currentTab) {
                    btn.className = "flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-bold border border-indigo-200 dark:border-indigo-800";
                } else {
                    btn.className = "flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700";
                }
            });
            inputCategoryName.textContent = categories[appState.currentTab];
        }

        function checkDisplayMode() {
            const currentTabData = appState.tabs[appState.currentTab];
            if (currentTabData && currentTabData.length > 0) {
                document.getElementById('inputSection').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                renderList();
            } else {
                document.getElementById('inputSection').classList.remove('hidden');
                document.getElementById('mainDashboard').classList.add('hidden');
            }
        }

        // --- DATA PROCESSING ---

        document.getElementById('btnLoadData').onclick = () => {
            const text = rawInput.value.trim();
            if (!text) return;

            const lines = text.split('\n')
                              .map(l => l.trim())
                              .filter(l => l.length > 0)
                              .map(val => ({ val, used: false, marked: false }));

            appState.tabs[appState.currentTab] = lines;
            appState.original[appState.currentTab] = JSON.parse(JSON.stringify(lines));
            
            rawInput.value = '';
            saveState();
            checkDisplayMode();
        };

        function renderList() {
            const list = appState.tabs[appState.currentTab];
            totalCount.textContent = list.length;
            
            dataListContainer.innerHTML = list.map((item, idx) => `
                <div class="group flex items-center justify-between p-4 ${item.marked ? 'marked-item' : 'hover:bg-indigo-50/30 dark:hover:bg-indigo-950/10'} transition-all">
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-mono text-slate-400 w-6">${idx + 1}</span>
                        <div class="font-mono text-base tracking-widest ${item.marked ? 'marked-text' : 'text-slate-700 dark:text-slate-200'} select-all">
                            ${item.val}
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleMark(${idx})" class="w-10 h-10 flex items-center justify-center rounded-lg border ${item.marked ? 'bg-rose-500 border-rose-500 text-white' : 'border-slate-300 dark:border-slate-600 text-slate-400 hover:border-rose-500 hover:text-rose-500'} transition cursor-pointer">
                            <i class="fa-solid ${item.marked ? 'fa-xmark' : 'fa-check'}"></i>
                        </button>
                        
                        <button onclick="copyData('${item.val}', ${item.marked})" 
                                class="px-4 py-2 text-xs font-bold rounded-lg border transition cursor-pointer 
                                ${item.marked ? 'bg-slate-100 dark:bg-slate-700 border-transparent text-slate-400 cursor-not-allowed' : 'bg-white dark:bg-slate-700 border-slate-300 dark:border-slate-600 hover:bg-indigo-600 hover:text-white hover:border-indigo-600'}"
                                ${item.marked ? 'disabled' : ''}>
                            SALIN
                        </button>

                        <button onclick="markUsed(${idx})" class="px-4 py-2 text-xs font-bold bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg shadow-sm transition cursor-pointer">
                            PAKAI
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- ROW ACTIONS ---

        window.toggleMark = function(idx) {
            const item = appState.tabs[appState.currentTab][idx];
            item.marked = !item.marked;
            saveState();
            renderList();
        }

        window.copyData = function(val, isMarked) {
            if (isMarked) return; // Proteksi agar tidak bisa disalin jika ada tanda X
            navigator.clipboard.writeText(val).then(() => {
                toast.classList.remove('opacity-0', 'translate-y-10');
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 1500);
            });
        }

        window.markUsed = function(idx) {
            const list = appState.tabs[appState.currentTab];
            const item = list.splice(idx, 1)[0];
            item.used = true;
            list.push(item); // Pindah ke paling bawah
            saveState();
            renderList();
        }

        // --- DASHBOARD ACTIONS ---

        document.getElementById('btnShuffle').onclick = () => {
            const list = appState.tabs[appState.currentTab];
            for (let i = list.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [list[i], list[j]] = [list[j], list[i]];
            }
            saveState();
            renderList();
        };

        document.getElementById('btnReset').onclick = () => {
            if (confirm('Reset urutan kategori ini ke awal?')) {
                appState.tabs[appState.currentTab] = JSON.parse(JSON.stringify(appState.original[appState.currentTab]));
                saveState();
                renderList();
            }
        };

        document.getElementById('btnClear').onclick = () => {
            if (confirm('Hapus data kategori ini dan input baru?')) {
                appState.tabs[appState.currentTab] = [];
                appState.original[appState.currentTab] = [];
                saveState();
                checkDisplayMode();
            }
        };

        // --- THEME LOGIC ---
        function initTheme() {
            const t = localStorage.getItem('theme') || 'dark';
            if (t === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('themeIcon').className = isDark ? 'fa-solid fa-sun text-amber-400' : 'fa-solid fa-moon text-indigo-500';
        }

        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        };

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
